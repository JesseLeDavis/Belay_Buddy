name: belay_buddy
description: "A climbing community app"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  go_router: ^14.2.3
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4

  # Firebase
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Image & Camera
  image_picker: ^1.1.2

  # UI Components
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.2
  custom_lint: ^0.6.5
  riverpod_lint: ^2.3.13
  json_serializable: ^6.8.0


flutter:
  uses-material-design: true
